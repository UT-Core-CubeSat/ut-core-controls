# ═══════════════════════════════════════════════════════════════════
# prj.conf — Zephyr Kernel Configuration for the Orion B16 GNSS App
# ═══════════════════════════════════════════════════════════════════
#
# WHAT IS THIS FILE?
#   Zephyr uses Kconfig (same system as the Linux kernel) to decide
#   which features to include in your firmware.  This file is like a
#   list of checkboxes: "yes I need UART", "yes I need logging", etc.
#
#   When you run `west build`, Zephyr reads this file and only compiles
#   the kernel features you actually asked for.  This keeps the firmware
#   small (important for microcontrollers with limited flash).
#
# ═══════════════════════════════════════════════════════════════════

# ── Console & Logging ────────────────────────────────────────────
# These let us print messages over the USB serial connection.
# LOG_INF("hello") in our code becomes visible in your terminal.
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# ── Kernel ───────────────────────────────────────────────────────
# TICKLESS = more power efficient (no periodic timer interrupt).
# MAIN_STACK_SIZE = how much RAM the main() thread gets (4 KB).
CONFIG_TICKLESS_KERNEL=y
CONFIG_MAIN_STACK_SIZE=4096

# ── UART (serial port to the Orion B16) ─────────────────────────
# SERIAL = enable UART hardware drivers.
# UART_INTERRUPT_DRIVEN = when a byte arrives, fire an interrupt
#   instead of busy-polling (much more efficient).
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# ── Ring Buffer ──────────────────────────────────────────────────
# A circular buffer in RAM.  The UART interrupt stuffs bytes in;
# the parser thread pulls bytes out.  Decouples the two.
CONFIG_RING_BUFFER=y

# ── C library & floating point ───────────────────────────────────
# NEWLIB_LIBC gives us printf with %f support (ESP32 has an FPU).
# FPU enables the hardware floating-point unit.
CONFIG_NEWLIB_LIBC=y
CONFIG_FPU=y

# ── Threads ──────────────────────────────────────────────────────
# Our driver spawns a background "parser thread".
# THREAD_NAME makes it show up nicely in debug tools.
CONFIG_MULTITHREADING=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y

# ── GPIO (optional — for GNSS reset/PPS pins later) ─────────────
CONFIG_GPIO=y

# ── Power management (disabled for now; enable on the CubeSat) ──
# CONFIG_PM=y
# CONFIG_PM_DEVICE=y

# ── GPS Simulator (uncomment to test without Orion hardware) ────
# CONFIG_ORION_B16_SIMULATOR=y
